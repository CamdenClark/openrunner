name: Multi-Job DAG
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact: ${{ steps.compile.outputs.result }}
    steps:
      - name: Compile
        id: compile
        run: |
          echo "compiling..."
          echo "result=build-42" >> "$GITHUB_OUTPUT"

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Run linter
        run: echo "linting passed"

  deploy:
    runs-on: ubuntu-latest
    needs: [build, lint]
    steps:
      - name: Deploy artifact
        run: |
          echo "deploying ${{ needs.build.outputs.artifact }}"
