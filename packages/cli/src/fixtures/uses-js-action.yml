name: Uses JS Action
on: push
jobs:
  action:
    runs-on: ubuntu-latest
    steps:
      - name: Hello action
        uses: actions/hello-world-javascript-action@main
        with:
          who-to-greet: "Acceptance Test"
        id: hello
      - name: Check output
        run: |
          if [ -z "${{ steps.hello.outputs.time }}" ]; then
            echo "ERROR: expected time output" && exit 1
          fi
          echo "Action ran at ${{ steps.hello.outputs.time }}"
